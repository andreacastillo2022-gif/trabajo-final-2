<main class="chat-container">
    
    <app-sidebar 
  [usuarios]="usuarios"
  (usuarioSeleccionado)="seleccionarUsuario($event)">
  </app-sidebar>

    <div class="chat-primero">
    
        <header class="chat-header">
        <h2>Chat</h2>
        </header>

        <div class="chat-messages"> 
        @for (msg of usuarioActivo.mensajes; track $index) {
            <div class="mensaje" [class.mi]="msg.mio" [class.otro]="!msg.mio">
        {{ msg.texto }}
    </div>
  }

        </div>

        <form class="chat-input">
            <input type="text" placeholder="Escribí un mensaje..." />
            <button>Enviar</button>
        </form>
    </div>

 

  

</main>
