<section class="login-bloque">
  <div class="container">

    <div class="barra">
      <div class="col-md-12">

        <h3>Iniciar sesión</h3>

        <input 
          type="text" 
          placeholder="Usuario"
          [formControl]="usuario">

        <input 
          type="password" 
          placeholder="Contraseña"
          [formControl]="password">

        <br><br>

        <button 
        class="btn"(click)="login()">Acceder a los mensajes</button>

      </div>
    </div>

  </div>
</section>
